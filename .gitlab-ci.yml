stages:
  - scan
  - build

variables:
  NODE_VERSION: "20"
  GITLEAKS_VERSION: "8.18.0"
  GIT_DEPTH: "0"   # full history so gitleaks can scan

gitleaks:
  stage: scan
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl git tar
    - curl -sL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /usr/local/bin gitleaks
  script:
    - gitleaks detect --source . --redact --verbose --exit-code 1
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

build:backend:
  stage: build
  image: node:${NODE_VERSION}
  script:
    - cd backend
    - npm install --no-audit --no-fund
    - node --check src/server.js
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

build:web:
  stage: build
  image: node:${NODE_VERSION}
  script:
    - cd web
    - npm install --no-audit --no-fund
    - npm run build
  artifacts:
    paths:
      - web/dist/
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
