stages:
  - scan
  - build

variables:
  NODE_VERSION: "20"

gitleaks:
  stage: scan
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --redact --verbose
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

build:backend:
  stage: build
  image: node:${NODE_VERSION}
  cache:
    key:
      files:
        - backend/package-lock.json
    paths:
      - backend/node_modules/
  script:
    - cd backend
    - npm ci || npm install
    - node --check src/server.js
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

build:web:
  stage: build
  image: node:${NODE_VERSION}
  cache:
    key:
      files:
        - web/package-lock.json
    paths:
      - web/node_modules/
  script:
    - cd web
    - npm ci || npm install
    - npm run build
  artifacts:
    paths:
      - web/dist/
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
