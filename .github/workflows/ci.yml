name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.18.0
          curl -sL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Run gitleaks (full history scan)
        run: gitleaks detect --source . --redact --verbose --exit-code 1

  build:
    name: Build (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [backend, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm install --no-audit --no-fund
      - name: Build (web only)
        if: matrix.workspace == 'web'
        working-directory: web
        run: npm run build
      - name: Syntax check (backend only)
        if: matrix.workspace == 'backend'
        working-directory: backend
        run: node --check src/server.js
